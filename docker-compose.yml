# =============================================================================
# Docker Compose - Gateway Offloading Pattern
# Kong API Gateway + User Service + Order Service + ItemService
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Kong API Gateway (DB-less / Declarative mode)
  # ---------------------------------------------------------------------------
  kong:
    build:
      context: ./kong
      dockerfile: Dockerfile
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"

#      config for kong manager UI
      KONG_ADMIN_GUI_LISTEN: "0.0.0.0:8002"
      KONG_ADMIN_GUI_URL: "http://localhost:8002"

      KONG_SSL_CERT: /etc/kong/ssl/server.crt
      KONG_SSL_CERT_KEY: /etc/kong/ssl/server.key

      KONG_LOG_LEVEL: info
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      # Custom plugin for JWT header extraction
      KONG_PLUGINS: "bundled,jwt-header-injector"
      KONG_LUA_PACKAGE_PATH: "/etc/kong/plugins/?.lua;/etc/kong/plugins/?/init.lua;;"
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
      - ./kong/ssl:/etc/kong/ssl:ro
      - ./kong/plugins:/etc/kong/plugins:ro
      - ./logs:/opt/kong/logs
    ports:
      - "8000:8000" # HTTP Proxy
      - "8443:8443" # HTTPS Proxy (SSL Termination)
      - "8001:8001" # Admin API
      - "8002:8002" # Manager UI
    networks:
      - gateway-network
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # User Service
  # ---------------------------------------------------------------------------
  user-service:
    build:
      context: ./spring-user-service
      dockerfile: Dockerfile
    container_name: spring-user-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/userdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SERVER_PORT: 8080
      # Gateway trust configuration
      GATEWAY_TRUSTED_HEADER: X-Gateway-Auth
      GATEWAY_TRUSTED_VALUE: kong-verified
    ports:
      - "8080:8080"
    networks:
      - gateway-network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MySQL Database
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_DATABASE: userdb
      MYSQL_ROOT_PASSWORD: 123456
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3309:3306"
    networks:
      - gateway-network
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  #  MySQL for Order Service
  mysql-order:
    image: mysql:8.0
    container_name: mysql-order-db
    environment:
      MYSQL_DATABASE: demooffloading
      MYSQL_ROOT_PASSWORD: K59Ptl*100504
#      MYSQL_USER: order_user
#      MYSQL_PASSWORD: order_password
    volumes:
      - mysql-order-data:/var/lib/mysql
    ports:
      - "3310:3306" # Tránh xung đột cổng 3309 của User DB
    networks:
      - gateway-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pK59Ptl*100504"]
      interval: 5s
      timeout: 3s
      retries: 5

  order-service:
    build:
      context: . # Thay đổi đường dẫn này cho khớp với thư mục code Order của bạn
      dockerfile: ./spring-order-service/Dockerfile
    container_name: spring-order-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8081
      # Gateway trust configuration (Kế thừa từ User Service)
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-order:3306/demooffloading?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: K59Ptl*100504
#      GATEWAY_TRUSTED_HEADER: X-Gateway-Auth
#      GATEWAY_TRUSTED_VALUE: kong-verified
    ports:
      - "8081:8081"
    networks:
      - gateway-network
    depends_on:
      mysql-order:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Item Service
  # ---------------------------------------------------------------------------
  item-service:
    build:
      context: .
      dockerfile: ./spring-item-service/Dockerfile
    container_name: spring-item-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8082
    ports:
      - "8082:8082"
    networks:
      - gateway-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Prometheus - Metrics Collection
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - gateway-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana - Metrics Visualization & Dashboard
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.1
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - gateway-network
    depends_on:
      - prometheus
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Elasticsearch - ELK Stack
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ELASTIC_PASSWORD=changeme
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - gateway-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Logstash - ELK Stack
  # ---------------------------------------------------------------------------
  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: logstash
    volumes:
      - ./elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    environment:
      - "LS_JAVA_OPTS=-Xmx256m -Xms256m"
      - "ELASTICSEARCH_HOSTS=http://elasticsearch:9200"
      - "ELASTICSEARCH_USERNAME=elastic"
      - "ELASTICSEARCH_PASSWORD=changeme"
    ports:
      - "5000:5000/tcp"
      - "5000:5000/udp"
      - "9600:9600"
    networks:
      - gateway-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9600"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Kibana - ELK Stack
  # ---------------------------------------------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=changeme
      - xpack.security.enabled=false
    volumes:
      - kibana-data:/usr/share/kibana/data
    ports:
      - "5601:5601"
    networks:
      - gateway-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status | grep -q 'state'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped


# =============================================================================
# Networks & Volumes
# =============================================================================
networks:
  gateway-network:
    driver: bridge
    name: gateway-offloading-net

volumes:
  mysql-data:
    driver: local
  mysql-order-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  elasticsearch-data:
    driver: local
  kibana-data:
    driver: local

# Custom Kong configuration for SSL/TLS Termination
# This file is mounted into the Kong container

# SSL/TLS Termination - Kong handles HTTPS, forwards HTTP to backend
ssl_cert = /etc/kong/ssl/server.crt
ssl_cert_key = /etc/kong/ssl/server.key

# Proxy listens
proxy_listen = 0.0.0.0:8000, 0.0.0.0:8443 ssl

# Admin API (only internal access)
admin_listen = 0.0.0.0:8001

# DB-less mode (declarative config)
database = off
declarative_config = /etc/kong/kong.yml

# Logging
proxy_access_log = /dev/stdout
proxy_error_log = /dev/stderr
admin_access_log = /dev/stdout
admin_error_log = /dev/stderr

# Performance
nginx_worker_processes = auto

# Trusted IPs for forwarded headers
trusted_ips = 0.0.0.0/0,::/0

# Real IP header
real_ip_header = X-Forwarded-For
real_ip_recursive = on

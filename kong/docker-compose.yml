# docker-compose.yml
version: '3.9'

services:
  kong:
    image: kong:3.4-ubuntu
    container_name: kong-gateway
    environment:
      - KONG_DATABASE=off # KHÔNG SỬ DỤNG DB (Cực kỳ quan trọng)
      - KONG_DECLARATIVE_CONFIG=/opt/kong/kong.yml # Đường dẫn trỏ tới file cấu hình trong container
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001, 0.0.0.0:8444 ssl
    ports:
      - "8000:8000" # Proxy (Nơi client gọi vào)
      - "8001:8001" # Admin API (Nơi bạn kiểm tra cấu hình)
      - "8443:8443" # Proxy HTTPS
    volumes:
      - ./kong.yml:/opt/kong/kong.yml # Mount file từ máy host vào container
    restart: always
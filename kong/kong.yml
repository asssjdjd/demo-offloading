# kong.yml
_format_version: "3.0"
_info:
  select_tags:
    - production

services:
  # Order Service
  - name: order-service
    url: http://host.docker.internal:8080/
    routes:
      - name: order-api-route
        paths:
          - /api/v1/orders
        path_handling: v0
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - DELETE
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          hour: 1000
          policy: local

  # Item Service  
  - name: item-service
    url: http://host.docker.internal:8081/
    routes:
      - name: item-api-route
        paths:
          - /api/v1/items
        path_handling: v0
        strip_path: false
        methods:
          - GET
          - POST
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          hour: 1000
          policy: local

  # User Service
  - name: user-service
    url: http://host.docker.internal:8082/
    routes:
      - name: user-api-route
        paths:
          - /api/v1/users
        path_handling: v0
        strip_path: false
        methods:
          - GET
          - POST
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          hour: 1000
          policy: local
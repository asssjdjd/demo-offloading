# Group 2 - Proxy Cache plugin
# Note: append vao danh sach plugins trong kong.yml

plugins:
  - name: proxy-cache
    route: user-service-protected
    config:
      response_code:
        - 200
      request_method:
        - GET
      content_type:
        - application/json
      cache_ttl: 30
      strategy: memory
      vary_headers:
        - Authorization

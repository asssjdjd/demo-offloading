# =============================================================================
# Logstash Configuration - Kong TCP-log to Elasticsearch
# =============================================================================

input {
  # Nhận logs từ Kong TCP-log plugin trên port 5000
  tcp {
    port => 5000
    codec => json
    type => "kong-logs"
  }
}

filter {
  # Parse Kong logs
  if [type] == "kong-logs" {
    # Extract request/response information
    mutate {
      add_field => { "[@metadata][index_name]" => "kong-logs-%{+YYYY.MM.dd}" }
    }

    # Parse timestamps
    date {
      match => [ "timestamp", "UNIX_MS" ]
      target => "@timestamp"
    }

    # Add service labels
    if ![service] {
      mutate {
        add_field => { "service" => "unknown" }
      }
    }

    # Parse response status code
    if [response][status] {
      mutate {
        add_field => { "response_status" => "%{[response][status]}" }
      }
      mutate {
        convert => { "response_status" => "integer" }
      }
    }

    # Calculate response latency
    if [request][uri] {
      mutate {
        add_field => { "request_path" => "%{[request][uri]}" }
      }
    }
  }

  # Remove unnecessary fields
  mutate {
    remove_field => [ "host" ]
  }
}

output {
  # Gửi đến Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][index_name]}"
  }

  # Debug: In ra console
  stdout {
    codec => rubydebug
  }
}
